  <title>Математический Тренажёр 🎓</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      visibility: hidden;
      overflow: hidden;
      font-family: 'Comic Sans MS', 'Arial', sans-serif;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }
    
    body.loaded {
      visibility: visible;
      opacity: 1;
    }
    
    .container {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #87CEEB;
    }
    
    .image-wrapper {
      position: relative;
      display: inline-block;
      max-width: 100%;
      max-height: 100vh;
    }
    
    .background-image {
      display: block;
      width: 100%;
      height: auto;
      max-height: 100vh;
    }
    
    .clickable-zones {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 3%;
      pointer-events: none;
      z-index: 2;
    }
    
    .zone {
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      pointer-events: all;
    }
    
    .btn {
      width: 15%;
      min-width: 100px;
      max-width: 180px;
      padding: 2% 2%;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      border: 3px solid #fff;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      font-size: clamp(9px, 2.5vw, 16px);
      font-weight: 900;
      color: #020004;
      text-align: center;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
      transition: all 0.3s ease;
      animation: bounce 2s infinite;
    }
    
    @media (min-width: 768px) {
      .btn {
        min-width: 120px;
        padding: 2% 3%;
        border: 4px solid #fff;
        border-radius: 20px;
        font-size: clamp(11px, 1.3vw, 16px);
      }
    }
    
    .zone-left .btn {
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    }
    
    .zone-left:hover .btn {
      background: linear-gradient(135deg, #FFF59D, #FFEB3B);
    }
    
    .zone-right .btn {
      background: linear-gradient(135deg, #4ECDC4, #44A08D);
    }
    
    .zone-right:hover .btn {
      background: linear-gradient(135deg, #81D4FA, #4FC3F7);
    }
    
    .zone:hover .btn {
      transform: scale(1.15) rotate(-2deg);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
    }
    
    .zone:active .btn {
      transform: scale(0.95);
    }
    
    .zone:hover .btn-text {
      display: none;
    }
    
    .zone:hover .btn-text-hover {
      display: block;
    }
    
    .btn-emoji {
      font-size: clamp(12px, 3vw, 20px);
      display: block;
      margin-bottom: 2px;
    }
    
    .btn-text {
      font-size: clamp(8px, 2.5vw, 14px);
      line-height: 1.1;
      display: block;
      font-weight: 900;
    }
    
    .btn-text-hover {
      display: none;
      font-size: clamp(9px, 2.5vw, 15px);
      line-height: 1.2;
      font-weight: 800;
    }
    
    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }
    
    @media (max-width: 768px) {

  <script>
    const NETLIFY_URL = 'https://vermillion-platypus-908cd1.netlify.app';
    
    function getDeviceFingerprint() {
      if (typeof ClientJS === 'undefined') {
        const screenRes = screen.width + 'x' + screen.height;
        const colorDepth = screen.colorDepth;
        const timezone = new Date().getTimezoneOffset();
        const language = navigator.language;
        const platform = navigator.platform;
        const userAgent = navigator.userAgent;
        
        const data = screenRes + '|' + colorDepth + '|' + timezone + '|' + language + '|' + platform + '|' + userAgent;
        
        let hash = 0;
        for (let i = 0; i < data.length; i++) {
          const char = data.charCodeAt(i);
          hash = ((hash << 5) - hash) + char;
          hash = hash & hash;
        }
        
        return 'fb_' + Math.abs(hash).toString(36);
      }
      
      const client = new ClientJS();
      const fingerprint = client.getFingerprint();
      return 'fp_' + fingerprint.toString();
    }
    
    function getDeviceName() {
      const ua = navigator.userAgent;
      let deviceName = 'Неизвестное устройство';
      
      if (/Mobile|Android|iPhone|iPad/i.test(ua)) {
        if (/iPhone/i.test(ua)) deviceName = 'iPhone';
        else if (/iPad/i.test(ua)) deviceName = 'iPad';
        else if (/Android/i.test(ua)) deviceName = 'Android';
        else deviceName = 'Мобильное устройство';
      } else {
        if (/Windows/i.test(ua)) deviceName = 'Windows ПК';
        else if (/Mac/i.test(ua)) deviceName = 'Mac';
        else if (/Linux/i.test(ua)) deviceName = 'Linux ПК';
        else deviceName = 'Компьютер';
      }
      
      return deviceName;
    }
    
    function togglePassword() {
      const passwordInput = document.getElementById('passwordInput');
      const toggleIcon = document.querySelector('.password-toggle');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        toggleIcon.textContent = '👁️';
      }
    }
    
async function handleLogin() {
  const email = document.getElementById('loginInput').value.trim();
  const password = document.getElementById('passwordInput').value.trim();
  
  if (!email || !password) {
    alert('Введите email и пароль!');
    return;
  }
  
  try {
    const deviceFingerprint = getDeviceFingerprint();
    const deviceName = getDeviceName();

    // Проверяем логин через Netlify
    const response = await fetch(`${NETLIFY_URL}/.netlify/functions/login_check`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const result = await response.json();

    if (!response.ok) {
      alert(result.error || 'Ошибка входа');
      return;
    }

    const userId = result.userId;

    // Проверяем устройство
    const deviceResponse = await fetch(`${NETLIFY_URL}/.netlify/functions/device_check`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, deviceFingerprint, deviceName, email })
    });

    const deviceResult = await deviceResponse.json();

    if (!deviceResponse.ok) {
      alert(deviceResult.error || 'Ошибка проверки устройства');
      return;
    }

    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('userId', userId);
    localStorage.setItem('userEmail', email);
    localStorage.setItem('deviceFingerprint', deviceFingerprint);

    const overlay = document.getElementById('loginOverlay');
    overlay.classList.add('hidden');
    document.body.classList.remove('locked');

    document.getElementById('settingsBtn').classList.add('show');
    document.getElementById('logoutBtn').classList.add('show');

    if (email === 'tzsharipov@gmail.com') {
      document.getElementById('adminBtn').style.display = 'block';
    }

  } catch (err) {
    console.error(err);
    alert('Произошла ошибка при входе. Попробуйте ещё раз.');
  }
}
    
    function handleDemoExit() {
      localStorage.removeItem('isDemoMode');
      // счётчики НЕ чистим — они остаются на устройстве
      window.location.href = 'index.html';
    }

    function handleLogout() {
      if (!confirm('Вы уверены что хотите выйти?')) {
        return;
      }
      
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userId');
      localStorage.removeItem('userEmail');
      
      window.location.reload();
    }
    
window.addEventListener('DOMContentLoaded', async () => {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      const isDemoMode = localStorage.getItem('isDemoMode') === 'true';

      // Демо режим — скрываем оверлей логина, показываем приложение
      if (isDemoMode && isLoggedIn !== 'true') {
        const overlay = document.getElementById('loginOverlay');
        if (overlay) {
          overlay.classList.add('hidden');
          document.body.classList.remove('locked');
        }
        document.getElementById('demoExitBtn').style.display = 'block';
      }
      
      if (isLoggedIn === 'true') {
        // Сразу показываем кнопки, так как пользователь "свой"
        document.getElementById('settingsBtn').classList.add('show');
        document.getElementById('logoutBtn').classList.add('show');
        
        const userEmail = localStorage.getItem('userEmail');
        if (userEmail === 'tzsharipov@gmail.com') {
          document.getElementById('adminBtn').style.display = 'block';
        }

        // ПРОВЕРКА: Если уже залогинены, проверяем оплату СРАЗУ
        const isAccessOk = await checkAccessStrict();
        
        if (isAccessOk) {
          const overlay = document.getElementById('loginOverlay');
          if (overlay) {
            overlay.classList.add('hidden');
            document.body.classList.remove('locked');
          }
        }
      }
      
      const passwordInput = document.getElementById('passwordInput');
      if (passwordInput) {
        passwordInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') handleLogin();
        });
      }
      
      const backgroundImg = document.querySelector('.background-image');
      if (backgroundImg) {
        if (backgroundImg.complete) document.body.classList.add('loaded');
        else backgroundImg.addEventListener('load', () => document.body.classList.add('loaded'));
      } else {
        document.body.classList.add('loaded');
      }
    });

    // ЖЕСТКАЯ ПРОВЕРКА: Если оплаты нет — выкидываем немедленно
    async function checkAccessStrict() {
  try {
    const userId = localStorage.getItem('userId');
    const email = localStorage.getItem('userEmail');
    
    if (!userId || !email) return false;

    const response = await fetch(`${NETLIFY_URL}/.netlify/functions/login_check`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: localStorage.getItem('passwordHash') || '' })
    });

    if (!response.ok) {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userId');
      localStorage.removeItem('userEmail');
      window.location.reload();
      return false;
    }

    return true;
  } catch (e) {
    console.error("Ошибка проверки доступа:", e);
    return true;
  }
}
  </script>

  <script>
  // ВРЕМЕННО ДЛЯ ВИДЕО - Баннеры
  (function() {
    // Показываем баннер ПОСЛЕ логина когда появляется стартовая страница
    const observer = new MutationObserver(function(mutations) {
      if (!document.body.classList.contains('locked')) {
        // Стартовая страница показана!
        setTimeout(() => {
          const banner = document.getElementById('initialBanner');
          if (!banner) return;
          banner.style.display = 'block';
          
          // Функция скрытия баннера
          function hideBanner() {
            banner.classList.add('fade-out');
            setTimeout(() => banner.remove(), 1000);
          }
          
          // Убираем баннер при клике на любую из трёх кнопок
          const multiplicationBtn = document.querySelector('a[href="multiplication.html"]');
          const divisionBtn = document.querySelector('a[href="division.html"]');
          const basicsBtn = document.querySelector('a[href="basics.html"]');
          
          if (multiplicationBtn) multiplicationBtn.addEventListener('click', hideBanner);
          if (divisionBtn) divisionBtn.addEventListener('click', hideBanner);
          if (basicsBtn) basicsBtn.addEventListener('click', hideBanner);
        }, 500);
        
        observer.disconnect();
      }
    });
    
    observer.observe(document.body, { 
      attributes: true, 
      attributeFilter: ['class'] 
    });
    
    // Клавиша K для финального баннера (только латиница!)
    document.addEventListener('keydown', (e) => {
      console.log('Нажата клавиша:', e.key, e.code);
      if (e.key.toLowerCase() === 'k') {
        const finalBanner = document.getElementById('finalBanner');
        console.log('Показываю финальный баннер');
        finalBanner.style.display = 'flex';
      }
    });
  })();
  </script>
</body>
</html>
