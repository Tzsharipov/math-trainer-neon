<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="metrika.js"></script>
  <title>Math Trainer - Умножение и Деление</title>
  
  <!-- Проверка авторизации -->
  <script>
    // Проверяем доступ: залогинен или демо режим
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      if (localStorage.getItem('isDemoMode') === 'true') {
        // Демо режим — разрешаем, но инициализируем счётчик
        window.__demoModule = 'multiplication';
      } else {
        window.location.href = 'index.html';
      }
    }
  </script>
  
  <style>
    body {
      visibility: hidden;
    }
    body.loaded {
      visibility: visible;
    }
    
    /* Анимация появления нижней подсказки */
    @keyframes fadeInSlide {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .side-hint-animate {
      animation: fadeInSlide 0.5s ease-out forwards;
    }
    
    /* Анимация мигания для подсвеченных ячеек - ЖЁЛТЫЙ */
    @keyframes pulseYellow {
      0%, 100% {
        background-color: rgb(250 204 21); /* yellow-400 */
        border-color: transparent;
        transform: scale(1.05);
      }
      50% {
        background-color: rgb(253 224 71); /* yellow-300 - светлее */
        border-color: rgb(202 138 4); /* yellow-600 - тёмная рамка */
        transform: scale(1.1);
      }
    }
    
    /* Анимация мигания для подсвеченных ячеек - ОРАНЖЕВЫЙ */
    @keyframes pulseOrange {
      0%, 100% {
        background-color: rgb(253 186 116); /* orange-300 */
        border-color: transparent;
        transform: scale(1.05);
      }
      50% {
        background-color: rgb(254 215 170); /* orange-200 - светлее */
        border-color: rgb(249 115 22); /* orange-500 - тёмная рамка */
        transform: scale(1.1);
      }
    }
    
    .cell-pulse-yellow {
      animation: pulseYellow 1.5s ease-in-out infinite;
      border-width: 3px;
      border-style: solid;
    }
    
    .cell-pulse-orange {
      animation: pulseOrange 1.5s ease-in-out infinite;
      border-width: 3px;
      border-style: solid;
    }
    
    /* ВРЕМЕННО ДЛЯ ВИДЕО */
    .final-banner {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      z-index: 10001;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(40px, 8vw, 80px) clamp(30px, 6vw, 60px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      max-width: min(90vw, 800px);
      width: auto;
    }
    
    .final-banner h1 {
      font-size: clamp(24px, 5vw, 48px);
      font-weight: 900;
      margin-bottom: 20px;
      text-shadow: 0 4px 8px rgba(0,0,0,0.3);
      line-height: 1.2;
    }
    
    .final-banner h2 {
      font-size: clamp(20px, 4vw, 40px);
      font-weight: 700;
      color: #fbbf24;
    }
  </style>
  
</head>
<body>
  <!-- ВРЕМЕННО ДЛЯ ВИДЕО -->
  <div class="final-banner" id="finalBanner">
    <h1>Сделал для сына — поможет и вам.</h1>
    <h2>stolbik.online</h2>
  </div>

  <div id="app" class="min-h-screen bg-sky-50 p-2 md:p-6 font-sans text-slate-800 flex items-center justify-center">
  
  <!-- Панель настроек (показывается в начале) -->
  <aside id="settingsPanel" class="w-full max-w-sm bg-cyan-400 p-4 rounded-[2.5rem] shadow-xl text-white">
    <h1 class="text-xl font-black mb-3 uppercase tracking-tight text-gray-900 text-center">Умножение</h1>
    
    <!-- Информация о лимитах -->
    <div class="bg-white/20 rounded-xl p-2 mb-4 font-bold border border-white/30 leading-relaxed text-blue-800 text-center" style="font-size: clamp(11px, 2vw, 14px);">
  Лимиты разрядности:<br>
  Множимое: 7 | Множитель: 5
</div>
    
    <!-- Чекбокс подсказок -->
    <div class="mb-4">
      <label class="flex items-center gap-3 p-3 rounded-2xl bg-yellow-400 text-slate-800 cursor-pointer hover:bg-yellow-300 transition-all shadow-md">
        <input type="checkbox" id="checkHints" class="w-5 h-5 accent-blue-600" checked>
        <span class="font-black text-xs uppercase">Включить подсказки</span>
      </label>
    </div>
    
    <!-- Переключатель режима -->
    <div class="flex flex-col gap-2 mb-4 text-sm">
      <label class="flex items-center gap-3 p-3 rounded-2xl bg-white/10 cursor-pointer hover:bg-white/20 transition-all">
        <input type="radio" name="mode" value="auto" checked class="w-4 h-4 accent-blue-600">
        <span class="font-bold text-blue-800">Придумай пример за меня</span>
      </label>
      <label class="flex items-center gap-3 p-3 rounded-2xl bg-white/10 cursor-pointer hover:bg-white/20 transition-all">
        <input type="radio" name="mode" value="manual" class="w-4 h-4 accent-blue-600">
        <span class="font-bold text-blue-800">Я напишу пример сам</span>
      </label>
    </div>
    
    <!-- Режим "Автоматический" -->
    <div id="ui-auto" class="space-y-4">
      <select id="selectA" class="w-full p-3 rounded-xl text-slate-800 font-bold outline-none border-none shadow-lg">
        <option value="1">1-значное</option>
        <option value="2">2-значное</option>
        <option value="3" selected>3-значное</option>
        <option value="4">4-значное</option>
        <option value="5">5-значное</option>
        <option value="6">6-значное</option>
        <option value="7">7-значное</option>
      </select>
      <select id="selectB" class="w-full p-3 rounded-xl text-slate-800 font-bold outline-none border-none shadow-lg">
        <option value="1">1-значное</option>
        <option value="2" selected>2-значное</option>
        <option value="3">3-значное</option>
        <option value="4">4-значное</option>
        <option value="5">5-значное</option>
      </select>
      <button id="btnGen" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-xl text-sm active:scale-95 transition-all">
        Создать пример
      </button>
    </div>
    
    <!-- Режим "Ручной" -->
    <div id="ui-manual" class="space-y-4 hidden text-slate-800">
      <input type="number" id="inA" placeholder="Число 1 (max 7)" class="w-full p-3 rounded-xl font-bold outline-none shadow-inner border-2 border-transparent focus:border-green-400">
      <input type="number" id="inB" placeholder="Число 2 (max 5)" class="w-full p-3 rounded-xl font-bold outline-none shadow-inner border-2 border-transparent focus:border-green-400">
      <button id="btnStartMan" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl uppercase text-sm shadow-xl transition-all">
        Начать решать
      </button>
    </div>
    
    <!-- Кнопки перехода -->
    <div class="flex gap-3 mt-4">
      <a href="division.html" class="flex-1 bg-purple-500 hover:bg-purple-600 text-white font-black py-3 px-4 rounded-xl shadow-xl text-xs text-center transition-all leading-tight">
        ➗ Перейти<br>к делению
      </a>
      <a href="app.html" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-black py-3 px-4 rounded-xl shadow-xl text-xs text-center transition-all leading-tight">
        🏠 На стартовую<br>страницу
      </a>
    </div>
  </aside>
  
  <!-- Рабочая область (скрыта в начале) -->
  <div id="workspace" class="hidden flex-col items-center px-2 md:px-0">
    <!-- Заголовок модуля -->
    <h2 class="text-lg md:text-2xl font-bold text-gray-900 tracking-tight mb-3 md:mb-6">Умножение</h2>
    
    <!-- Бежевый контейнер -->
    <div id="beigeContainer" class="flex flex-col items-center" style="background: linear-gradient(135deg, #f5e6ca, #eedcbf); border-radius: clamp(24px, 4vw, 40px); padding: clamp(2px, 0.4vw, 4px) clamp(10px, 2vw, 18px); box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: fit-content; margin: 0 auto;">
    
      <!-- Всплывающая подсказка ВЕРХНЯЯ -->
      <div id="hintPopup" class="relative" style="visibility: hidden; margin: clamp(6px, 1.2vw, 12px) 0;">
        <div class="bg-gradient-to-r from-yellow-400 to-amber-400 shadow-2xl relative" style="border-width: clamp(2px, 0.4vw, 4px); border-style: solid; border-color: rgb(202 138 4); border-radius: clamp(6px, 1.2vw, 12px); padding: clamp(6px, 1vw, 12px); z-index: 100;">
          <p id="hintText" class="font-bold text-gray-900 text-center" style="font-size: clamp(12px, 1.8vw, 16px);"></p>
        </div>
      </div>
      
      <!-- Сетка -->
      <div class="relative">
        <div class="bg-white shadow-2xl overflow-x-auto" style="border-radius: clamp(16px, 3vw, 48px); padding: clamp(8px, 2vw, 24px); border-width: clamp(4px, 0.8vw, 8px); border-style: solid; border-color: white;">
          <div id="mathGrid" class="font-mono w-fit mx-auto"></div>
        </div>
      </div>
      
      <!-- Подсказка ПОД сеткой -->
      <div id="sideHint" style="visibility: hidden; margin: clamp(6px, 1.2vw, 12px) 0;">
        <div class="shadow-2xl" style="background: linear-gradient(135deg, #cdb987, #906b2b); border-width: clamp(1px, 0.2vw, 2px); border-style: solid; border-color: rgb(154 52 18); border-radius: clamp(6px, 1.2vw, 12px); padding: clamp(6px, 1vw, 10px); max-width: clamp(180px, 38vw, 280px); min-width: clamp(150px, 22vw, 220px); margin: 0 auto;">
          <p id="sideHintText" class="font-bold text-white text-center" style="font-size: clamp(11px, 1.5vw, 14px); line-height: 1.3;"></p>
        </div>
      </div>
    
    </div>
    <!-- Конец бежевого контейнера -->
    
    <!-- checkMessage вне бежевого -->
    <div id="checkMessage" class="text-base md:text-xl font-bold text-center" style="min-height:0;"></div>
    
    <!-- Три кнопки в одну линию -->
    <div class="flex flex-row gap-2 md:gap-3 mt-2 w-full max-w-xl px-2 md:px-0">
      <button id="btnClearAll" class="flex-1 bg-cyan-400 hover:bg-cyan-500 active:bg-cyan-600 text-blue-800 font-black py-3 px-3 md:px-6 rounded-xl shadow-lg text-xs md:text-sm transition-all leading-tight">
        Очистить всё
      </button>
      
      <button id="btnNewExample" class="flex-1 bg-purple-500 hover:bg-purple-600 active:bg-purple-700 text-white font-black py-3 px-3 md:px-6 rounded-xl shadow-xl text-xs md:text-sm transition-all leading-tight">
        Новый<br>пример
      </button>
      
      <button id="btnBackToSettings" class="flex-1 bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-black py-3 px-3 md:px-6 rounded-xl shadow-xl text-xs md:text-sm transition-all leading-tight">
        🏠 Назад к<br>настройкам
      </button>
    </div>
  </div>
  
</div>
  
  <script type="module" src="/src/multiplication.js"></script>
  <script src="/confetti.min.js"></script>
  <!-- <script type="module" src="/src/main.js"></script> -->

  <script>
  // ВРЕМЕННО ДЛЯ ВИДЕО - Клавиша K для финального баннера
  document.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'k') {
      document.getElementById('finalBanner').style.display = 'flex';
    }
  });
  </script>


  <script>
    // Демо-режим: перехват кнопок после загрузки JS модуля
    (function() {
      if (localStorage.getItem('isLoggedIn') === 'true') return; // залогинен — не нужно
      if (localStorage.getItem('isDemoMode') !== 'true') return;  // не демо — не нужно

      const MODULE = 'multiplication';
      const DEMO_KEY = 'demo_' + MODULE + '_count';
      const DEMO_LIMIT = 5;
      const METRIKA_ID = 107219867;

      // Получаем актуальную акционную цену
      const NETLIFY_URL = 'https://vermillion-platypus-908cd1.netlify.app';
      let demoPrice = 100;
      fetch(`${NETLIFY_URL}/.netlify/functions/get_price_status`)
        .then(r => r.json())
        .then(data => { demoPrice = data.price; })
        .catch(() => {});
      
      function getCount() {
        return parseInt(localStorage.getItem(DEMO_KEY) || '0', 10);
      }

      function showCounter() {
        const remaining = DEMO_LIMIT - getCount();
        let el = document.getElementById('demoCounter');
        if (!el) {
          el = document.createElement('div');
          el.id = 'demoCounter';
          el.style.cssText = 'background:#fbbf24;color:#1f2937;padding:clamp(6px,1.2vw,10px) clamp(12px,2.5vw,20px);border-radius:20px;font-weight:900;font-size:clamp(12px,2.5vw,14px);box-shadow:0 2px 8px rgba(0,0,0,0.2);text-align:center;margin-bottom:clamp(4px,0.8vw,8px);';
          var bc = document.getElementById('beigeContainer'); if (bc && bc.parentNode) { bc.parentNode.insertBefore(el, bc); } else { document.body.appendChild(el); }
        }
        el.textContent = '🎯 Демо: осталось ' + remaining + ' из ' + DEMO_LIMIT + ' примеров';
      }

      function getTotalDemoCount() {
        return (parseInt(localStorage.getItem('demo_basics_count') || '0', 10) +
                parseInt(localStorage.getItem('demo_multiplication_count') || '0', 10) +
                parseInt(localStorage.getItem('demo_division_count') || '0', 10));
      }

      function showOffer() {
        try { if (typeof ym !== 'undefined') ym(METRIKA_ID, 'reachGoal', 'demo_finished'); } catch(e) {}
        const existing = document.getElementById('demoOfferModal');
        if (existing) return;
        const totalDone = getTotalDemoCount();
        const allModulesDone = totalDone >= 15;
        const modal = document.createElement('div');
        modal.id = 'demoOfferModal';
        modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;';
        modal.innerHTML = `
          <div style="background:white;border-radius:24px;padding:36px 28px;max-width:460px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.35);">
            <div style="font-size:60px;margin-bottom:12px;">🏆</div>
            <h2 style="font-size:clamp(20px,5vw,26px);font-weight:900;color:#1f2937;margin-bottom:16px;line-height:1.3;">Ты молодец!</h2>
            <p style="font-size:clamp(15px,3vw,18px);color:#374151;margin-bottom:28px;line-height:1.6;">
              Чтобы закрепить успех и стать отличником, открой полный доступ к <strong>1000+ примеров</strong>.
            </p>
            <button onclick="window.location.href='index.html#pricing'" style="display:block;width:100%;background:linear-gradient(135deg,#10B981,#059669);color:white;border:none;border-radius:14px;padding:18px 24px;font-size:clamp(16px,3.5vw,20px);font-weight:900;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 15px rgba(16,185,129,0.4);">
              🎓 Открыть полный доступ — ${demoPrice} ₽
            </button>
            ${!allModulesDone ? `<button onclick="window.location.href='app.html'" style="display:block;width:100%;background:#f3f4f6;color:#6b7280;border:none;border-radius:14px;padding:14px 24px;font-size:clamp(14px,3vw,16px);font-weight:700;cursor:pointer;">
              Попробовать другой модуль
            </button>` : ''}
          </div>
        `;
        document.body.appendChild(modal);
      }

      function wrapButton(btn) {
        if (!btn) return;
        const original = btn.onclick;
        btn.onclick = function(e) {
          const count = getCount();
          // Лимит уже достигнут — блокируем
          if (count >= DEMO_LIMIT) {
            showOffer();
            return;
          }
          // Показываем пример (выполняем оригинальное действие)
          if (original) original.call(this, e);
          // Считаем ПОСЛЕ того как пример показан
          const newCount = count + 1;
          localStorage.setItem(DEMO_KEY, String(newCount));
          if (newCount >= DEMO_LIMIT) {
            // Пользователь решил 5-й пример — показываем оффер
            showOffer();
          } else {
            showCounter();
          }
        };
      }

      // Ждём пока JS модуля назначит обработчики
      window.addEventListener('load', function() {
        // В демо-режиме включаем подсказки автоматически
        const checkHints = document.getElementById('checkHints');
        if (checkHints) checkHints.checked = true;

        // Если лимит уже достигнут — сразу блокируем модуль
        if (getCount() >= DEMO_LIMIT) {
          showOffer();
          return;
        }
        const btnGen = document.getElementById('btnGen');
        const btnNewExample = document.getElementById('btnNewExample');
        const btnStartMan = document.getElementById('btnStartMan');
        // btnGen и btnStartMan не считаются — они только открывают первый пример
        // Счёт идёт только через btnNewExample
        if (btnGen) {
          const origGen = btnGen.onclick;
          btnGen.onclick = function(e) {
            if (origGen) origGen.call(this, e);
          };
        }
        if (btnStartMan) {
          const origMan = btnStartMan.onclick;
          btnStartMan.onclick = function(e) {
            if (origMan) origMan.call(this, e);
          };
        }
        wrapButton(btnNewExample);
        // Показываем счётчик если уже есть прогресс
        if (getCount() > 0) showCounter();
        else showCounter(); // показываем "5 из 5" сразу при первом входе
      });
    })();
  </script>
</body>
</html>
